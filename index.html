<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>✈️ 天空射手 - 3D Plane Shooter</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{overflow:hidden;background:#0a0a1e;font-family:-apple-system,sans-serif}
canvas{display:block;position:fixed;top:0;left:0;z-index:0}
.overlay{position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,.35);backdrop-filter:blur(4px)}
.hidden{display:none!important}
h1{font-size:clamp(40px,8vw,70px);color:#fff;text-shadow:0 0 30px rgba(255,200,50,.6);letter-spacing:6px;margin-bottom:10px}
.subtitle{font-size:clamp(16px,3vw,24px);color:rgba(255,255,255,.7);letter-spacing:8px;margin-bottom:50px}
.btn{display:inline-block;padding:16px 48px;font-size:clamp(18px,3vw,22px);font-weight:700;color:#fff;background:linear-gradient(135deg,#FF6B35,#FF8C00);border:none;border-radius:12px;cursor:pointer;box-shadow:0 4px 20px rgba(255,107,53,.4);letter-spacing:2px;margin:10px 0}
.btn:hover{transform:scale(1.05);box-shadow:0 6px 30px rgba(255,107,53,.6)}
.hint{color:rgba(255,255,255,.6);font-size:14px}
kbd{padding:2px 8px;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);border-radius:4px;color:#fff}
.info{margin-top:20px;color:rgba(255,255,255,.5);font-size:13px;line-height:2}
#hud{position:fixed;top:0;left:0;width:100vw;z-index:5;pointer-events:none;padding:20px 30px;display:flex;justify-content:space-between}
.hud-item{display:flex;flex-direction:column;align-items:center}
.hud-label{font-size:11px;color:rgba(255,255,255,.5);letter-spacing:1px}
.hud-val{font-size:26px;font-weight:700;color:#fff}
.fire-stars{font-size:24px;color:#FFD700;text-shadow:0 0 12px rgba(255,215,0,.5)}
#gameover{position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:10;display:none;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,.5);backdrop-filter:blur(6px)}
#finalScore{font-size:clamp(48px,8vw,64px);font-weight:800;color:#FFD700;margin:20px 0}
.stats{display:flex;gap:30px;margin:20px 0;color:#fff}
.statItem{text-align:center}
.statLabel{font-size:12px;color:rgba(255,255,255,.5)}
.statVal{font-size:20px;font-weight:600;margin-top:4px}
#error{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#c0392b;color:#fff;padding:20px 30px;border-radius:10px;font-size:16px;z-index:100;text-align:center}
</style>
</head>
<body>
<canvas id="c"></canvas>

<div id="menu" class="overlay">
  <h1>✈️ 天空射手</h1>
  <p class="subtitle">3D Plane Shooter</p>
  <button class="btn" id="btnStart">🎮 开始游戏</button>
  <p class="hint">或按 <kbd>SPACE</kbd></p>
  <div class="info"><p><kbd>W A S D</kbd> 移动 &nbsp; <kbd>SPACE</kbd> 射击</p></div>
</div>

<div id="hud" class="hidden">
  <div class="hud-item"><span class="hud-label">分数</span><span class="hud-val" id="score">0</span></div>
  <div class="hud-item"><span class="hud-label">火力</span><span class="fire-stars" id="fire">★☆☆</span></div>
  <div class="hud-item"><span class="hud-label">生命</span><span class="hud-val" id="lives">❤️❤️❤️</span></div>
</div>

<div id="gameover">
  <h1 style="font-size:clamp(36px,6vw,50px);color:#fff;margin-bottom:10px">💥 游戏结束</h1>
  <p style="color:rgba(255,255,255,.5);font-size:12px;letter-spacing:2px">最终得分</p>
  <div id="finalScore">0</div>
  <div class="stats">
    <div class="statItem"><span class="statLabel">击杀</span><span class="statVal" id="kills">0</span></div>
    <div class="statItem"><span class="statLabel">时间</span><span class="statVal" id="time">0s</span></div>
    <div class="statItem"><span class="statLabel">火力</span><span class="statVal" id="maxFire">Lv1</span></div>
  </div>
  <button class="btn" id="btnRestart">🔄 再来一局</button>
  <p class="hint">或按 <kbd>SPACE</kbd></p>
</div>

<div id="error"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
'use strict';

// ============ DOM REFS (always available) ============
var $ = function(id){ return document.getElementById(id); };
var menu = $('menu'), hud = $('hud'), gameover = $('gameover');
var scoreEl = $('score'), fireEl = $('fire'), livesEl = $('lives');
var finalScoreEl = $('finalScore'), killsEl = $('kills'), timeEl = $('time'), maxFireEl = $('maxFire');
var errorEl = $('error');

// ============ STATE ============
var STATE = {MENU:0, PLAYING:1, OVER:2};
var state = STATE.MENU;
var score = 0, kills = 0, gameTime = 0, maxFire = 1, fireLvl = 1, lives = 3;
var lastSpawn = 0, invincible = false, invTimer = 0, lastShot = 0;
var keys = {};

// ============ HELPERS ============
function lerp(a,b,t){return a+(b-a)*t}
function clamp(v,mn,mx){return Math.max(mn,Math.min(mx,v))}
function rand(mn,mx){return Math.random()*(mx-mn)+mn}
function randInt(mn,mx){return Math.floor(rand(mn,mx+1))}
function updateHUD(){
  scoreEl.textContent = Math.floor(score);
  fireEl.textContent = '★'.repeat(fireLvl) + '☆'.repeat(3-fireLvl);
  livesEl.textContent = '❤️'.repeat(Math.max(0,lives));
}

// ============ GAME START/RESTART ============
function startGame(){
  if(typeof THREE==='undefined'){ errorEl.style.display='block';errorEl.textContent='Three.js 加载失败，请刷新重试';return; }
  if(!scene){ errorEl.style.display='block';errorEl.textContent='场景未初始化，请刷新重试';return; }
  cleanupAll();
  score=0;kills=0;gameTime=0;lastSpawn=0;maxFire=1;fireLvl=1;lives=3;
  invincible=true;invTimer=2000;lastShot=0;
  playerMesh.visible=true;
  playerMesh.position.set(0,0,0);
  state=STATE.PLAYING;
  menu.classList.add('hidden');
  gameover.style.display='none';
  hud.classList.remove('hidden');
  updateHUD();
}

function endGame(){
  state=STATE.OVER;
  explodeAt(playerMesh.position,30);
  playerMesh.visible=false;
  setTimeout(function(){
    hud.classList.add('hidden');
    finalScoreEl.textContent=Math.floor(score);
    killsEl.textContent=kills;
    timeEl.textContent=Math.floor(gameTime)+'s';
    maxFireEl.textContent='Lv'+maxFire;
    gameover.style.display='flex';
  },600);
}

// ============ INPUT (immediately active) ============
$('btnStart').onclick = startGame;
$('btnRestart').onclick = startGame;

window.onkeydown = function(e){
  var c=e.code, k=e.key;
  keys[c]=true;
  if(c==='Space'||k===' '){
    e.preventDefault();
    if(state===STATE.MENU||state===STATE.OVER) startGame();
  }
  if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','KeyW','KeyA','KeyS','KeyD'].indexOf(c)>=0) e.preventDefault();
};
window.onkeyup = function(e){ keys[e.code]=false; };

// ============ THREE.JS INIT ============
var scene, camera, renderer, playerMesh, clock;
var enemies=[], bullets=[], eBullets=[], pups=[], particles=[], clouds=[];

if(typeof THREE==='undefined'){
  errorEl.style.display='block';
  errorEl.textContent='Three.js 加载失败，请检查网络连接后刷新页面';
}else{
  (function initThree(){
    // Renderer
    renderer = new THREE.WebGLRenderer({canvas:$('c'),antialias:true});
    renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
    renderer.setSize(window.innerWidth,window.innerHeight);
    renderer.shadowMap.enabled=true;

    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0a2e);
    scene.fog = new THREE.Fog(0x0a0a2e,20,50);

    camera = new THREE.PerspectiveCamera(55,window.innerWidth/window.innerHeight,.1,100);
    camera.position.set(0,6,14);

    window.onresize = function(){
      camera.aspect=window.innerWidth/window.innerHeight;camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth,window.innerHeight);
    };

    // Lights
    scene.add(new THREE.AmbientLight(0x4466aa,.4));
    var sun=new THREE.DirectionalLight(0xffeedd,1.8);
    sun.position.set(10,20,10);scene.add(sun);
    scene.add(new THREE.DirectionalLight(0x88bbff,.4).position.set(-10,5,-10));
    scene.add(new THREE.DirectionalLight(0x4488ff,.3).position.set(0,-5,-10));

    // Stars
    var sg=new THREE.BufferGeometry();
    var sp=new Float32Array(1500*3);
    for(var i=0;i<sp.length;i++)sp[i]=rand(-50,50);
    sg.setAttribute('position',new THREE.BufferAttribute(sp,3));
    scene.add(new THREE.Points(sg,new THREE.PointsMaterial({color:0xffffff,size:.1,blending:THREE.AdditiveBlending})));

    // Clouds
    for(var i=0;i<12;i++){
      var g=new THREE.Group();
      var m=new THREE.MeshStandardMaterial({color:0xeeeeff,transparent:true,opacity:.1,roughness:1});
      var n=randInt(3,5);
      for(var j=0;j<n;j++){
        var s=new THREE.Mesh(new THREE.SphereGeometry(rand(1.5,3),6,6),m);
        s.position.set(rand(-3,3),rand(-.5,.5),rand(-1,1));s.scale.y=.5;
        g.add(s);
      }
      g.position.set(rand(-25,25),rand(-2,8),rand(-25,-5));
      scene.add(g);clouds.push({mesh:g,speed:rand(.3,.7)});
    }

    // Player airplane (cute cartoon style)
    playerMesh = new THREE.Group();
    var bodyC=0xFF6B35, wingC=0xFFAD33, bellyC=0xFFE082, glassC=0x81D4FA;
    var bodyMat=new THREE.MeshStandardMaterial({color:bodyC,roughness:.25,metalness:.1});
    var wingMat=new THREE.MeshStandardMaterial({color:wingC,roughness:.35,metalness:.05});
    var bellyMat=new THREE.MeshStandardMaterial({color:bellyC,roughness:.4});

    // Fuselage - smooth rounded body
    var fuseGeo=new THREE.CylinderGeometry(.28,.4,2.0,12).rotateX(Math.PI/2);
    playerMesh.add(new THREE.Mesh(fuseGeo,bodyMat));

    // Belly (lighter color)
    var bellyGeo=new THREE.CylinderGeometry(.26,.36,1.4,8,1,false,0,Math.PI).rotateX(Math.PI/2).rotateZ(Math.PI/2);
    var belly=new THREE.Mesh(bellyGeo,bellyMat);
    belly.position.set(0,-.22,0);playerMesh.add(belly);

    // Nose cone
    var nose=new THREE.Mesh(new THREE.ConeGeometry(.28,.5,12).rotateX(Math.PI/2),bodyMat);
    nose.position.set(0,0,1.2);playerMesh.add(nose);

    // Upper wings (swept back)
    var upWingGeo=new THREE.BoxGeometry(2.4,.05,.6);
    var upWing=new THREE.Mesh(upWingGeo,wingMat);
    upWing.position.set(0,.15,.25);upWing.rotation.z=-.08;playerMesh.add(upWing);

    // Lower wings
    var loWing=new THREE.Mesh(upWingGeo,wingMat);
    loWing.position.set(0,-.15,.25);loWing.rotation.z=.08;playerMesh.add(loWing);

    // Wing tips (decorative)
    var tipMat=new THREE.MeshStandardMaterial({color:0xFFD54F,roughness:.5});
    for(var s=-1;s<=1;s+=2){
      for(var t=-1;t<=1;t+=2){
        var tip=new THREE.Mesh(new THREE.BoxGeometry(.06,.2,.08),tipMat);
        tip.position.set(s*1.2,t*.16,.25);playerMesh.add(tip);
      }
    }

    // Horizontal stabilizer (tail wings)
    var tailMat=new THREE.MeshStandardMaterial({color:wingC,roughness:.4});
    for(var s=-1;s<=1;s+=2){
      var tWing=new THREE.Mesh(new THREE.BoxGeometry(.55,.03,.18),tailMat);
      tWing.position.set(s*.3,0,-.9);playerMesh.add(tWing);
    }

    // Vertical stabilizer (tail fin)
    var vFin=new THREE.Mesh(new THREE.BoxGeometry(.04,.38,.25).translate(0,.19,0),bodyMat);
    vFin.position.set(0,0,-.9);playerMesh.add(vFin);

    // Cockpit (glass dome)
    var cMat=new THREE.MeshStandardMaterial({color:glassC,transparent:true,opacity:.7,roughness:.1,metalness:.2});
    var cGeo=new THREE.SphereGeometry(.2,12,8,0,Math.PI*2,0,Math.PI/2);
    var cockpit=new THREE.Mesh(cGeo,cMat);
    cockpit.position.set(0,.16,.4);cockpit.scale.set(1,.45,.85);playerMesh.add(cockpit);

    // Engine exhaust
    var exMat=new THREE.MeshStandardMaterial({color:0x444444});
    var exhaust=new THREE.Mesh(new THREE.CylinderGeometry(.08,.1,.2,8),exMat);
    exhaust.position.set(0,0,-1.1);playerMesh.add(exhaust);

    // Propeller
    var propGroup=new THREE.Group();
    var propMat=new THREE.MeshStandardMaterial({color:0x666666,roughness:.6});
    for(var i=0;i<2;i++){
      var blade=new THREE.Mesh(new THREE.BoxGeometry(.05,.5,.08),propMat);
      blade.position.set(0,i===0?.25:-.25,0);propGroup.add(blade);
    }
    var hub=new THREE.Mesh(new THREE.SphereGeometry(.06,8,8),new THREE.MeshStandardMaterial({color:0x333333}));
    propGroup.add(hub);
    propGroup.position.set(0,0,1.55);playerMesh.add(propGroup);

    // Landing gear (cute tiny wheels)
    var wheelMat=new THREE.MeshStandardMaterial({color:0x222222});
    for(var s=-1;s<=1;s+=2){
      for(var z=-.6;z<=.4;z+=1){
        var wh=new THREE.Mesh(new THREE.SphereGeometry(.07,6,6).scale(1,.5,1),wheelMat);
        wh.position.set(s*.22,-.18,z);playerMesh.add(wh);
      }
    }

    // Rotate to face -Z (toward enemies)
    playerMesh.rotation.y=Math.PI;
    playerMesh.position.set(0,0,0);
    playerMesh.castShadow=true;
    scene.add(playerMesh);

    clock = new THREE.Clock();
    updateHUD();
    requestAnimationFrame(loop);
    console.log('✈️ 3D Plane Shooter READY');
  })();
}

// ============ GAME OBJECTS ============
function makeEnemy(elite){
  var g=new THREE.Group();
  if(elite){
    var bm=new THREE.MeshStandardMaterial({color:0x8B2252,roughness:.4});
    g.add(new THREE.Mesh(new THREE.ConeGeometry(.5,.5,10).rotateX(Math.PI/2),bm).position.set(0,0,-1.2));
    g.add(new THREE.Mesh(new THREE.BoxGeometry(.6,.06,.5,8),bm).position.set(0,0,-.3));
    g.add(new THREE.Mesh(new THREE.BoxGeometry(2.4,.06,.6),new THREE.MeshStandardMaterial({color:0x6B1540,roughness:.5})));
    var am=new THREE.MeshStandardMaterial({color:0xFF4444,emissive:0xFF4444,emissiveIntensity:.3});
    g.add(new THREE.Mesh(new THREE.BoxGeometry(.3,.04,.1),am).position.set(1.3,0,0));
    g.add(new THREE.Mesh(new THREE.BoxGeometry(.3,.04,.1),am).position.set(-1.3,0,0));
  }else{
    var bm2=new THREE.MeshStandardMaterial({color:0xE53935,roughness:.4});
    g.add(new THREE.Mesh(new THREE.ConeGeometry(.25,.3,10).rotateX(Math.PI/2),bm2).position.set(0,0,-.7));
    g.add(new THREE.Mesh(new THREE.CylinderGeometry(.25,.3,1.2,8).rotateX(Math.PI/2),bm2));
    g.add(new THREE.Mesh(new THREE.BoxGeometry(1.2,.04,.3),new THREE.MeshStandardMaterial({color:0xC62828})));
  }
  g.rotation.x=Math.PI;
  return g;
}

function addBullet(x,y,z,dx,dy){
  var m=new THREE.Mesh(new THREE.SphereGeometry(.07,6,6),new THREE.MeshBasicMaterial({color:0xffee44}));
  m.position.set(x,y,z);scene.add(m);
  bullets.push({mesh:m,vx:dx,vy:dy,vz:-35,life:0});
}

function addEBullet(x,y,z,tx,ty){
  var m=new THREE.Mesh(new THREE.SphereGeometry(.1,6,6),new THREE.MeshBasicMaterial({color:0xff3333}));
  m.position.set(x,y,z);scene.add(m);
  var d=new THREE.Vector3(tx-x,ty-y,-z).normalize().multiplyScalar(12);
  eBullets.push({mesh:m,vx:d.x,vy:d.y,vz:d.z,life:0});
}

function addPowerup(x,y,z,type){
  var g=new THREE.Group();
  if(type==='fire'){
    g.add(new THREE.Mesh(new THREE.BoxGeometry(.4,.4,.4),new THREE.MeshStandardMaterial({color:0xFF6B00,emissive:0xFF4400,emissiveIntensity:.5})).rotation.set(.7,.7,0));
  }else{
    var hm=new THREE.MeshStandardMaterial({color:0x00E676,emissive:0x00C853,emissiveIntensity:.4});
    g.add(new THREE.Mesh(new THREE.BoxGeometry(.1,.35,.1),hm));
    g.add(new THREE.Mesh(new THREE.BoxGeometry(.35,.1,.1),hm));
  }
  g.position.set(x,y,z);scene.add(g);
  pups.push({mesh:g,type:type,life:0,speed:2});
}

function explodeAt(pos,n){
  n=n||15;
  for(var i=0;i<n;i++){
    var m=new THREE.Mesh(
      new THREE.BoxGeometry(rand(.05,.12),rand(.05,.12),rand(.05,.12)),
      new THREE.MeshBasicMaterial({color:new THREE.Color().setHSL(.08+Math.random()*.08,1,.5+Math.random()*.4)})
    );
    m.position.copy(pos);scene.add(m);
    var d=new THREE.Vector3(rand(-1,1),rand(-1,1),rand(-1,1)).normalize().multiplyScalar(rand(3,7));
    particles.push({mesh:m,vx:d.x,vy:d.y,vz:d.z,life:0,maxLife:rand(.4,1)});
  }
}

function cleanupAll(){
  var arrs=[bullets,eBullets,pups];
  for(var a=0;a<arrs.length;a++){for(var b=0;b<arrs[a].length;b++)scene.remove(arrs[a][b].mesh);arrs[a].length=0;}
  for(var i=0;i<enemies.length;i++)scene.remove(enemies[i].mesh);enemies.length=0;
  for(var j=0;j<particles.length;j++)scene.remove(particles[j].mesh);particles.length=0;
}

// ============ GAME LOOP ============
var BOUND={xMin:-9,xMax:9,yMin:-5,yMax:6};
var elapsed=0;

function loop(){
  requestAnimationFrame(loop);
  var dt=Math.min(clock.getDelta(),.05);
  elapsed+=dt;

  // Clouds
  for(var i=0;i<clouds.length;i++){
    var c=clouds[i];
    c.mesh.position.z+=c.speed*dt;
    if(c.mesh.position.z>25){c.mesh.position.z=rand(-25,-15);c.mesh.position.x=rand(-25,25)}
  }

  if(state===STATE.MENU){
    camera.position.lerp(new THREE.Vector3(Math.sin(elapsed*.3)*3,6+Math.sin(elapsed*.2)*.5,14),.03);
    camera.lookAt(0,0,-2);
    // idle propeller
    var p0=playerMesh.children[playerMesh.children.length-1];
    if(p0)p0.rotation.z+=dt*60;
    renderer.render(scene,camera);
    return;
  }

  if(state!==STATE.PLAYING){
    // update particles while game over
    for(var j=particles.length-1;j>=0;j--){
      var pp=particles[j];
      pp.mesh.position.x+=pp.vx*dt;pp.mesh.position.y+=pp.vy*dt;pp.mesh.position.z+=pp.vz*dt;
      pp.vx*=.95;pp.vy*=.95;pp.vz*=.95;pp.life+=dt;
      if(pp.life>=pp.maxLife){scene.remove(pp.mesh);particles.splice(j,1)}
    }
    // clouds still move
    renderer.render(scene,camera);
    return;
  }

  // === PLAYING ===
  gameTime+=dt;

  // Player movement
  var mx=0,my=0;
  if(keys.KeyW||keys.ArrowUp)my=1;if(keys.KeyS||keys.ArrowDown)my=-1;
  if(keys.KeyA||keys.ArrowLeft)mx=-1;if(keys.KeyD||keys.ArrowRight)mx=1;
  if(mx&&my){mx*=.707;my*=.707;}
  playerMesh.position.x=clamp(playerMesh.position.x+mx*10*dt,BOUND.xMin,BOUND.xMax);
  playerMesh.position.y=clamp(playerMesh.position.y+my*10*dt,BOUND.yMin,BOUND.yMax);

  // Player animation
  playerMesh.rotation.z=lerp(playerMesh.rotation.z,-mx*.3,.1);
  playerMesh.rotation.x=lerp(playerMesh.rotation.x,-my*.12,.1);
  var prop=playerMesh.children[playerMesh.children.length-1];
  if(prop)prop.rotation.z+=dt*60;

  // Invincibility
  if(invincible){
    invTimer-=dt*1000;
    playerMesh.visible=Math.floor(invTimer/100)%2===0;
    if(invTimer<=0){invincible=false;playerMesh.visible=true;}
  }

  // Shoot
  if(keys.Space){
    var now=elapsed*1000;
    if(now-lastShot>150){
      lastShot=now;
      var pp2=playerMesh.position;
      if(fireLvl===1){addBullet(pp2.x,pp2.y,pp2.z-1,0,0)}
      else if(fireLvl===2){addBullet(pp2.x-.25,pp2.y,pp2.z-1,-.3,0);addBullet(pp2.x+.25,pp2.y,pp2.z-1,.3,0)}
      else{addBullet(pp2.x,pp2.y,pp2.z-1,0,0);addBullet(pp2.x-.3,pp2.y-.1,pp2.z-1,-.3,-.1);addBullet(pp2.x+.3,pp2.y+.1,pp2.z-1,.3,.1)}
    }
  }

  // Spawn enemies
  var diff=Math.min(gameTime/120,1);
  if(elapsed*1000-lastSpawn>(2000-diff*1600)){
    var elite=Math.random()<.15*(1+diff);
    var e=makeEnemy(elite);
    e.position.set(rand(BOUND.xMin+1,BOUND.xMax-1),rand(BOUND.yMin+1,BOUND.yMax-1),rand(-30,-18));
    scene.add(e);
    enemies.push({mesh:e,elite:elite,hp:elite?2+Math.floor(diff*3):1,speed:(elite?3:5)+diff*8,st:elite?rand(1.5,3):0,wb:rand(0,Math.PI*2)});
    lastSpawn=elapsed*1000;
  }

  // Update enemies
  for(var i=enemies.length-1;i>=0;i--){
    var en=enemies[i];
    en.mesh.position.z+=en.speed*dt;
    if(!en.elite){en.wb+=dt*3;en.mesh.position.x+=Math.sin(en.wb)*dt*.5}
    if(en.elite){
      en.st-=dt;
      if(en.st<=0&&en.mesh.position.z<-3){addEBullet(en.mesh.position.x,en.mesh.position.y,en.mesh.position.z,playerMesh.position.x,playerMesh.position.y);en.st=rand(1.5,3)*(1-diff*.3)}
    }
    if(en.mesh.position.z>8){scene.remove(en.mesh);enemies.splice(i,1)}
  }

  // Update bullets
  var updateArr=function(arr,mlife,zmax){
    for(var i=arr.length-1;i>=0;i--){
      var b=arr[i];b.mesh.position.x+=b.vx*dt;b.mesh.position.y+=b.vy*dt;b.mesh.position.z+=b.vz*dt;b.life+=dt;
      if(b.life>mlife||b.mesh.position.z<-25){scene.remove(b.mesh);arr.splice(i,1)}
    }
  };
  updateArr(bullets,2.5,25);
  updateArr(eBullets,4,10);

  // Update powerups
  for(var i=pups.length-1;i>=0;i--){
    var pu=pups[i];pu.mesh.position.z+=pu.speed*dt;pu.life+=dt;
    if(pu.life>8||pu.mesh.position.z>8){scene.remove(pu.mesh);pups.splice(i,1)}
  }

  // Update particles
  for(var i=particles.length-1;i>=0;i--){
    var p=particles[i];
    p.mesh.position.x+=p.vx*dt;p.mesh.position.y+=p.vy*dt;p.mesh.position.z+=p.vz*dt;
    p.vx*=.97;p.vy*=.97;p.vz*=.97;p.life+=dt;
    if(p.life>=p.maxLife){scene.remove(p.mesh);particles.splice(i,1)}
  }

  // Collisions: bullets vs enemies
  for(var bi=bullets.length-1;bi>=0;bi--){
    for(var ei=enemies.length-1;ei>=0;ei--){
      if(bullets[bi].mesh.position.distanceTo(enemies[ei].mesh.position)<(enemies[ei].elite?.8:.5)){
        scene.remove(bullets[bi].mesh);bullets.splice(bi,1);
        enemies[ei].hp--;
        if(enemies[ei].hp<=0){
          var epp=enemies[ei].mesh.position;
          explodeAt(epp,enemies[ei].elite?30:15);
          var wasElite=enemies[ei].elite;
          scene.remove(enemies[ei].mesh);enemies.splice(ei,1);
          if(Math.random()<.25){addPowerup(epp.x,epp.y,epp.z,Math.random()<.6?'fire':'health')}
          kills++;score+=wasElite?50:10;maxFire=Math.max(maxFire,fireLvl);
        }
        break;
      }
    }
  }

  // Enemy bullets vs player
  if(!invincible){
    for(var i=eBullets.length-1;i>=0;i--){
      if(eBullets[i].mesh.position.distanceTo(playerMesh.position)<.6){
        scene.remove(eBullets[i].mesh);eBullets.splice(i,1);
        invincible=true;invTimer=2000;lives--;
        if(lives<=0){endGame();updateHUD();renderer.render(scene,camera);return}
      }
    }
  }

  // Collision: enemies vs player
  if(!invincible){
    for(var i=enemies.length-1;i>=0;i--){
      if(enemies[i].mesh.position.distanceTo(playerMesh.position)<(enemies[i].elite?1:.7)){
        explodeAt(enemies[i].mesh.position,10);
        scene.remove(enemies[i].mesh);enemies.splice(i,1);
        invincible=true;invTimer=2000;lives--;
        if(lives<=0){endGame();updateHUD();renderer.render(scene,camera);return}
      }
    }
  }

  // Powerups vs player
  for(var i=pups.length-1;i>=0;i--){
    if(pups[i].mesh.position.distanceTo(playerMesh.position)<1.2){
      var tt=pups[i].type;
      scene.remove(pups[i].mesh);pups.splice(i,1);
      if(tt==='fire')fireLvl=Math.min(fireLvl+1,3);
      else lives=Math.min(lives+1,3);
      maxFire=Math.max(maxFire,fireLvl);
    }
  }

  score+=dt*.5;

  // Camera
  var ppp=playerMesh.position;
  camera.position.lerp(new THREE.Vector3(ppp.x*.3,ppp.y*.3+7,12),3*dt);
  camera.lookAt(ppp.x*.2,ppp.y*.3,-2);

  updateHUD();
  renderer.render(scene,camera);
}
</script>
</body>
</html>
